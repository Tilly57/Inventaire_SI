groups:
  - name: api-availability
    rules:
      # API service down
      - alert: ApiDown
        expr: up{job="inventaire-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API Inventaire SI est DOWN"
          description: "Le service API est inaccessible depuis plus d'1 minute."

      # High error rate (>5% of requests returning 5xx)
      - alert: HighErrorRate
        expr: |
          (sum(rate(http_requests_total{job="inventaire-api",status_code=~"5.."}[5m]))
          / sum(rate(http_requests_total{job="inventaire-api"}[5m]))) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Taux d'erreurs 5xx élevé ({{ $value | humanizePercentage }})"
          description: "Plus de 5% des requêtes API retournent des erreurs 5xx."

      # Slow API responses (P95 > 2s)
      - alert: SlowApiResponses
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="inventaire-api"}[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latence API élevée (P95: {{ $value | humanizeDuration }})"
          description: "Le 95e percentile de latence dépasse 2 secondes."

  - name: infrastructure
    rules:
      # High memory usage (>512MB)
      - alert: HighMemoryUsage
        expr: inventaire_api_process_resident_memory_bytes{job="inventaire-api"} > 536870912
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Mémoire élevée ({{ $value | humanize1024 }}B)"
          description: "Le processus Node.js utilise plus de 512MB de mémoire."

      # Event loop lag (>100ms)
      - alert: EventLoopLag
        expr: inventaire_api_nodejs_eventloop_lag_seconds{job="inventaire-api"} > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Event loop lag élevé ({{ $value | humanizeDuration }})"
          description: "Le lag de l'event loop dépasse 100ms — opérations bloquantes détectées."

      # Too many open file descriptors (>80%)
      - alert: HighOpenFileDescriptors
        expr: |
          inventaire_api_process_open_fds{job="inventaire-api"}
          / inventaire_api_process_max_fds{job="inventaire-api"} > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Descripteurs de fichiers élevés ({{ $value | humanizePercentage }})"
          description: "Plus de 80% des descripteurs de fichiers sont utilisés."

  - name: database
    rules:
      # Slow DB queries (P95 > 1s)
      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95,
            sum(rate(db_query_duration_seconds_bucket{job="inventaire-api"}[5m])) by (le, operation)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Requêtes DB lentes ({{ $labels.operation }} P95: {{ $value | humanizeDuration }})"
          description: "Les requêtes {{ $labels.operation }} prennent plus d'1 seconde au P95."

      # DB errors increasing
      - alert: DatabaseErrors
        expr: sum(rate(db_errors_total{job="inventaire-api"}[5m])) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Erreurs base de données détectées"
          description: "Le taux d'erreurs DB est supérieur à 0.1/s depuis 5 minutes."

  - name: business
    rules:
      # No API traffic for 10 minutes during business hours (8h-19h)
      - alert: NoTraffic
        expr: |
          sum(rate(http_requests_total{job="inventaire-api"}[10m])) == 0
          and ON() hour() >= 8 <= 19
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Aucun trafic API détecté"
          description: "Aucune requête API depuis 10 minutes pendant les heures ouvrées."
