# Alertmanager Configuration - Inventaire SI
#
# Pour activer les emails, configurer les variables SMTP dans .env :
#   SMTP_HOST, SMTP_PORT, SMTP_FROM, SMTP_USERNAME, SMTP_PASSWORD
#
# Si SMTP non configuré, Alertmanager démarre mais les alertes
# sont uniquement visibles dans l'UI Alertmanager.

global:
  resolve_timeout: 5m

# Route tree
route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'null'

  routes:
    # Critical alerts: shorter repeat interval
    - match:
        severity: critical
      receiver: 'null'
      repeat_interval: 1h
      group_wait: 10s

receivers:
  # Null receiver — logs alerts but doesn't send notifications
  # Replace with email/slack config when SMTP is available
  - name: 'null'

# Inhibition rules — suppress lower severity if critical is firing
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
