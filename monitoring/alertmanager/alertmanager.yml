# Alertmanager Configuration - Inventaire SI
#
# Notifications email configurees via variables d'environnement SMTP
# dans docker-compose.prod.yml (SMTP_HOST, SMTP_PORT, SMTP_FROM, etc.)

global:
  resolve_timeout: 3m
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertes@tillyinventaire.ti'
  smtp_require_tls: false

# Route tree
route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email-alerts'

  routes:
    # Critical alerts: shorter repeat interval
    - match:
        severity: critical
      receiver: 'email-alerts'
      repeat_interval: 1h
      group_wait: 10s

receivers:
  # Email alerts — envoie aux administrateurs
  - name: 'email-alerts'
    email_configs:
      - to: 'admin@tillyinventaire.ti'
        send_resolved: true
        headers:
          subject: '[Inventaire SI] {{ .GroupLabels.alertname }} - {{ .GroupLabels.severity }}'

# Inhibition rules — suppress lower severity if critical is firing
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
