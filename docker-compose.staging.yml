# Stack STAGING — Inventaire SI
#
# Environnement de pré-production, derrière le proxy edge (Traefik), sur
# staging.tillyinventaire.ti. Déployé par la CI (build-images.yml → job
# deploy-staging) qui pull les images depuis GHCR.
#
# Différences avec docker-compose.prod.yml :
#   - api / web / api-migrate : images GHCR (pas de build sur serveur)
#   - AUCUN container_name figé : Compose préfixe par COMPOSE_PROJECT_NAME
#     (inventaire-staging) → isolation totale des conteneurs/volumes/réseaux
#   - labels Traefik : routeur/service `inventaire-staging`, host staging.*
#   - certbot retiré (TLS géré par l'edge)
#   - GF_SERVER_ROOT_URL paramétrable (staging)
#
# Usage serveur :
#   cd /opt/inventaire/staging
#   docker compose -p inventaire-staging -f docker-compose.staging.yml pull
#   docker compose -p inventaire-staging -f docker-compose.staging.yml up -d
# (NE JAMAIS utiliser --remove-orphans : risque de toucher la stack prod)

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventaire}
      POSTGRES_USER: ${POSTGRES_USER:-inventaire_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventaire_user} -d ${POSTGRES_DB:-inventaire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - inventaire_network

  # Redis Cache & Blacklist
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --maxmemory 256mb --maxmemory-policy allkeys-lru
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - inventaire_network

  # One-shot Prisma migration runner (même image que l'API).
  api-migrate:
    image: ghcr.io/tilly57/inventaire-api:${IMAGE_TAG:-staging}
    restart: "no"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]
    networks:
      - inventaire_network

  # API Backend
  api:
    image: ghcr.io/tilly57/inventaire-api:${IMAGE_TAG:-staging}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://staging.tillyinventaire.ti}
      # Sentry — monitoring erreurs et performances (backend)
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-staging}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    expose:
      - "3001"
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --timeout=5 --spider http://127.0.0.1:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - inventaire_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Web (image buildée par la CI avec les VITE_* de staging bakés)
  web:
    image: ghcr.io/tilly57/inventaire-web:${IMAGE_TAG:-staging}
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      - api
    networks:
      - inventaire_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx INTERNE (routage par chemin) — derrière le proxy edge (Traefik).
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - inventaire_network   # vers api / web / grafana / prometheus
      - edge                 # ingress via le proxy edge (Traefik)
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge"
      - "traefik.http.routers.inventaire-staging.rule=Host(`staging.tillyinventaire.ti`)"
      - "traefik.http.routers.inventaire-staging.entrypoints=websecure"
      - "traefik.http.routers.inventaire-staging.tls=true"
      - "traefik.http.services.inventaire-staging.loadbalancer.server.port=80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Alertmanager (Alert Notifications via Email)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Inject SMTP env vars into config at startup
        sed -e "s|\$${SMTP_HOST}|$$SMTP_HOST|g" \
            -e "s|\$${SMTP_PORT}|$$SMTP_PORT|g" \
            -e "s|\$${SMTP_FROM}|$$SMTP_FROM|g" \
            /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    environment:
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_FROM: ${SMTP_FROM:-alertes-staging@tillyinventaire.ti}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    expose:
      - "9093"
    networks:
      - inventaire_network

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.external-url=/prometheus/'
      - '--web.route-prefix=/prometheus/'
    expose:
      - "9090"
    depends_on:
      - alertmanager
    networks:
      - inventaire_network

  # Loki (Log Aggregation)
  loki:
    image: grafana/loki:2.9.7
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    expose:
      - "3100"
    volumes:
      - loki_data:/loki
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks:
      - inventaire_network

  # Promtail (Log Collection → Loki)
  promtail:
    image: grafana/promtail:2.9.7
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - api_logs:/var/log/api:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - inventaire_network

  # Grafana (Dashboards & Visualization)
  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      GF_INSTALL_PLUGINS: grafana-piechart-panel 1.6.4
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-https://staging.tillyinventaire.ti/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    expose:
      - "3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - inventaire_network

networks:
  inventaire_network:
    driver: bridge
  # Réseau neutre partagé avec le proxy edge (créé une fois : docker network create edge).
  edge:
    external: true
    name: edge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_uploads:
    driver: local
  api_logs:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
