# Auto-deployment service for Inventaire SI
#
# Polls the git remote every 2 minutes for changes
# on the production branch. If changes detected,
# pulls and rebuilds Docker services automatically.
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.deploy.yml up -d auto-deploy
#
# Logs:
#   docker logs -f inventaire_auto_deploy

services:
  auto-deploy:
    image: docker:cli
    container_name: inventaire_auto_deploy
    restart: unless-stopped
    # Loads BACKUP_ENCRYPTION_KEY + DEPLOY_REQUIRE_GPG from a host-side secrets
    # file (chmod 600, owned by root). Required since v1.3.4 for encrypted
    # pre-deploy backups and safe rollback. The path is optional — the service
    # still starts without it (backup step skips with a loud warning).
    env_file:
      - path: /etc/inventaire/.env.deploy
        required: false
    environment:
      - DEPLOY_REPO_DIR=/repo
      - DEPLOY_BRANCH=production
      - DEPLOY_COMPOSE_FILE=docker-compose.prod.yml
      # HOST_REPO_DIR is the path on the Docker host (not inside this container)
      # Docker compose must use this path so bind mount volumes resolve correctly
      - HOST_REPO_DIR=${HOST_REPO_DIR:-/opt/inventaire}
      - COMPOSE_PROJECT_NAME=inventaire_si
      - POLL_INTERVAL=${DEPLOY_POLL_INTERVAL:-120}
      - HEALTH_CHECK_RETRIES=${HEALTH_CHECK_RETRIES:-6}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-10}
      - DB_CONTAINER=inventaire_postgres
      - DB_USER=${POSTGRES_USER:-inventaire_user}
      - DB_NAME=${POSTGRES_DB:-inventaire}
      - TZ=${TZ:-Europe/Paris}
    volumes:
      # Mount the project directory (read-write for git pull)
      - ${HOST_REPO_DIR:-/opt/inventaire}:/repo
      # Mount Docker socket to control other containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount deploy script
      - ${HOST_REPO_DIR:-/opt/inventaire}/scripts/auto-deploy.sh:/scripts/auto-deploy.sh:ro
    working_dir: /repo
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Install git
        apk add --no-cache git > /dev/null 2>&1

        # Configure git safe directory
        git config --global --add safe.directory /repo

        echo "[auto-deploy] Starting auto-deployment service"
        echo "[auto-deploy] Branch: $${DEPLOY_BRANCH}"
        echo "[auto-deploy] Poll interval: $${POLL_INTERVAL}s"
        echo "[auto-deploy] Repo: $${DEPLOY_REPO_DIR}"

        # Poll loop
        while true; do
          sh /scripts/auto-deploy.sh || echo "[auto-deploy] Check failed, will retry..."
          sleep $${POLL_INTERVAL}
        done
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"