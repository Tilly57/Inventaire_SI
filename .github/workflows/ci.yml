name: CI - Tests & Quality Gates

on:
  pull_request:
    branches: [main, staging, release/**]
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────
  # Job 1: Lint & TypeScript (Frontend)
  # ──────────────────────────────────────────
  lint-web:
    name: Lint & TypeScript (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci --legacy-peer-deps

      - name: TypeScript type-check
        run: cd apps/web && npx tsc -b

      - name: ESLint
        run: cd apps/web && npm run lint

  # ──────────────────────────────────────────
  # Job 2: API Tests (Unit + Integration)
  # ──────────────────────────────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inventaire
          POSTGRES_PASSWORD: ci_test_${{ github.run_id }}
          POSTGRES_DB: inventaire_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://inventaire:ci_test_${{ github.run_id }}@localhost:5432/inventaire_test?connection_limit=10&pool_timeout=30
      JWT_ACCESS_SECRET: ci_access_secret_${{ github.run_id }}
      JWT_REFRESH_SECRET: ci_refresh_secret_${{ github.run_id }}
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: cd apps/api && npm ci

      - name: Validate Prisma schema
        run: cd apps/api && npx prisma validate

      - name: Run database migrations
        run: cd apps/api && npx prisma migrate deploy

      - name: Run unit tests
        run: cd apps/api && npx cross-env NODE_OPTIONS=--experimental-vm-modules jest --testPathIgnorePatterns integration

      - name: Run integration tests
        run: cd apps/api && npx cross-env NODE_OPTIONS=--experimental-vm-modules jest --testPathPatterns integration

  # ──────────────────────────────────────────
  # Job 3: Build Verification
  # ──────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: cd apps/api && npm ci

      - name: Generate Prisma Client
        run: cd apps/api && npx prisma generate

  build-web:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd apps/web && npm run build

  # ──────────────────────────────────────────
  # Job 4: Docker Build Verification
  # ──────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t inventaire-api-check ./apps/api

      - name: Build Web image
        run: docker build -t inventaire-web-check --build-arg VITE_API_URL=/api ./apps/web

  # ──────────────────────────────────────────
  # Job 5: Security Audit
  # ──────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit API dependencies
        run: cd apps/api && npm audit --audit-level=high

      - name: Audit Web dependencies
        run: cd apps/web && npm audit --audit-level=high

      - name: Check for secrets in code
        run: |
          FOUND=0
          # Pattern format: "flags|regex" — flags are passed to grep (e.g. "i" for case-insensitive, "" for case-sensitive)
          # Patterns:
          #   - password with non-empty string value (excludes `password: ''` placeholders)
          #   - CHANGEME: case-sensitive word match (avoids matching French words like "changements")
          #   - secret_key_here: case-insensitive placeholder marker
          #   - sk-*: OpenAI/Anthropic API key shape
          #   - AKIA*: AWS access key shape
          PATTERNS=(
            "i|password\s*[:=]\s*['\"][^'\"]+['\"]"
            "w|CHANGEME"
            "i|secret_key_here"
            "|sk-[a-zA-Z0-9]{20,}"
            "|AKIA[0-9A-Z]{16}"
          )
          for entry in "${PATTERNS[@]}"; do
            flags="${entry%%|*}"
            pattern="${entry#*|}"
            grep_flags="-rn"
            [[ "$flags" == *i* ]] && grep_flags="${grep_flags}i"
            [[ "$flags" == *w* ]] && grep_flags="${grep_flags}w"
            matches=$(grep $grep_flags -E "$pattern" apps/ \
              --include="*.ts" --include="*.js" --include="*.tsx" \
              --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=seeds \
              --exclude="*.test.*" --exclude="*.spec.*" 2>/dev/null | \
              grep -vE ":\s*\*" | \
              grep -v "process.env" | grep -v "import.meta.env" | \
              grep -v "example" | grep -v "placeholder" | \
              grep -v "validator" | grep -v "schema" | head -5)
            if [ -n "$matches" ]; then
              echo "FAILED: Potential hardcoded secret found for pattern: $pattern"
              echo "$matches"
              FOUND=1
            fi
          done
          if [ "$FOUND" = "1" ]; then
            echo "Security check failed: hardcoded secrets detected"
            exit 1
          fi

  # ──────────────────────────────────────────
  # Quality Gate - All checks must pass
  # ──────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint-web, test-api, build-api, build-web, docker-build, security]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "## CI Pipeline Results"
          echo ""

          FAILED=0
          RESULTS=(
            "lint-web:${{ needs.lint-web.result }}"
            "test-api:${{ needs.test-api.result }}"
            "build-api:${{ needs.build-api.result }}"
            "build-web:${{ needs.build-web.result }}"
            "docker-build:${{ needs.docker-build.result }}"
            "security:${{ needs.security.result }}"
          )

          for result in "${RESULTS[@]}"; do
            JOB="${result%%:*}"
            STATUS="${result##*:}"
            if [ "$STATUS" = "success" ]; then
              echo "  ✅ $JOB"
            elif [ "$STATUS" = "skipped" ]; then
              echo "  ⏭️  $JOB (skipped)"
            else
              echo "  ❌ $JOB ($STATUS)"
              FAILED=1
            fi
          done

          echo ""

          if [ "$FAILED" = "1" ]; then
            echo "❌ Quality gate FAILED — merge blocked"
            exit 1
          fi

          echo "✅ Quality gate PASSED — ready to merge"
