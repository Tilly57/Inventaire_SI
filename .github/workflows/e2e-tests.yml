name: E2E Tests

on:
  pull_request:
    branches: [main, staging]

  push:
    branches: [main]

  workflow_dispatch:

  # Nightly at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e-tests:
    name: E2E Tests - Playwright
    runs-on: ubuntu-latest

    env:
      TEST_DB_PASSWORD: ci_e2e_${{ github.run_id }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: inventaire_test
          POSTGRES_USER: inventaire
          POSTGRES_PASSWORD: ci_e2e_${{ github.run_id }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install backend dependencies
        run: cd apps/api && npm ci

      - name: Install frontend dependencies
        run: cd apps/web && npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Setup database
        env:
          DATABASE_URL: postgresql://inventaire:${{ env.TEST_DB_PASSWORD }}@localhost:5432/inventaire_test
        run: |
          cd apps/api
          npx prisma migrate deploy
          npx prisma db seed

      - name: Generate secrets
        run: |
          mkdir -p secrets
          openssl rand -base64 64 | tr -d '\n' > secrets/jwt_access_secret.txt
          openssl rand -base64 64 | tr -d '\n' > secrets/jwt_refresh_secret.txt

      - name: Start API server
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://inventaire:${{ env.TEST_DB_PASSWORD }}@localhost:5432/inventaire_test
          REDIS_URL: redis://localhost:6379
          CORS_ORIGIN: http://localhost:5175
          PORT: 3001
        run: |
          cd apps/api
          export JWT_ACCESS_SECRET=$(cat ../../secrets/jwt_access_secret.txt)
          export JWT_REFRESH_SECRET=$(cat ../../secrets/jwt_refresh_secret.txt)
          npm run start &
          timeout 60 bash -c 'until curl -sf http://localhost:3001/api/health/readiness; do sleep 2; done'

      - name: Start frontend dev server
        env:
          VITE_API_URL: http://localhost:3001/api
          VITE_ENV: test
        run: |
          cd apps/web
          npm run dev &
          timeout 60 bash -c 'until curl -sf http://localhost:5175; do sleep 2; done'

      # Smoke tests are BLOCKING — must pass
      - name: Run smoke tests (blocking)
        env:
          BASE_URL: http://localhost:5175
        run: cd apps/web && npm run test:e2e -- 00-smoke.spec.ts

      # Critical loan workflow — BLOCKING
      - name: Run critical loan workflow (blocking)
        env:
          BASE_URL: http://localhost:5175
        run: cd apps/web && npm run test:e2e -- 11-critical-loan-workflow.spec.ts

      # Full E2E suite — non-blocking (informational)
      - name: Run full E2E suite
        env:
          BASE_URL: http://localhost:5175
          CI: true
        run: cd apps/web && npm run test:e2e
        continue-on-error: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

      - name: Upload test videos (on failure)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-videos
          path: apps/web/test-results/
          retention-days: 7

      - name: Stop servers
        if: always()
        run: |
          pkill -f "node src/index.js" || true
          pkill -f "vite" || true

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'apps/web/test-results/results.json';

            if (!fs.existsSync(resultsPath)) {
              return;
            }

            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            const { suites } = results;

            let passed = 0, failed = 0, skipped = 0;

            const countTests = (suite) => {
              if (suite.specs) {
                suite.specs.forEach(spec => {
                  if (spec.ok) passed++;
                  else if (spec.tests[0]?.status === 'skipped') skipped++;
                  else failed++;
                });
              }
              if (suite.suites) suite.suites.forEach(countTests);
            };

            suites.forEach(countTests);
            const total = passed + failed + skipped;
            const passRate = total > 0 ? Math.round((passed / total) * 100) : 0;
            const emoji = failed === 0 ? '✅' : '❌';

            const body = `## ${emoji} E2E Test Results

            **Total:** ${total} | **Passed:** ✅ ${passed} | **Failed:** ❌ ${failed} | **Skipped:** ⏭️ ${skipped} | **Pass Rate:** ${passRate}%

            [View report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
